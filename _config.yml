---
# 站点配置
title: 卷王小组技术研究
description: 卷王小组的深度技术研究博客
lang: zh-CN

# 主题配置
theme: minima

# 分类和标签配置
permalink: /:categories/:year/:month/:day/:title.html

# 插件配置
plugins:
  - jekyll-paginate
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# 分页配置
paginate: 10
paginate_path: "/page/:num/"

# Markdown设置
markdown: kramdown

# 默认值
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author: 卷王小组

# 排除文件
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
