---
layout: default
---

<div style="max-width: 800px; margin: 0 auto; padding: 2rem 0;">
  <h1 style="font-size: 1.75rem; font-weight: 700; color: var(--text-heading); margin-bottom: 1.5rem; border-bottom: 2px solid var(--accent); padding-bottom: 0.5rem;">🔖 {{ page.title }}</h1>
  <div>
    {% for post in page.posts %}
    <a href="{{ post.url | relative_url }}" style="display: flex; align-items: baseline; gap: 0.75rem; padding: 8px 10px; border-radius: 8px; text-decoration: none; color: inherit; transition: background 0.2s ease;" onmouseover="this.style.background='rgba(99,102,241,0.06)'" onmouseout="this.style.background=''">
      <span style="font-size: 0.82rem; color: var(--text-tertiary); font-family: var(--font-mono); white-space: nowrap;">{{ post.date | date: "%Y-%m-%d" }}</span>
      <span style="font-size: 1rem; color: var(--text-heading); font-weight: 500;">{{ post.title | escape }}</span>
    </a>
    {% endfor %}
  </div>
</div>
