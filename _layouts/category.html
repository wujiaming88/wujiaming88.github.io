---
layout: default
---

<style>
.cat-page {
    max-width: 800px;
    margin: 0 auto;
    padding: 2rem 0;
}
.cat-page-header {
    margin-bottom: 2rem;
}
.cat-page-header h1 {
    font-size: 1.75rem;
    font-weight: 700;
    color: var(--text-heading);
    margin: 0 0 0.5rem;
    border: none;
    padding: 0;
    display: flex;
    align-items: center;
    gap: 0.5rem;
}
.cat-page-header .count-badge {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--accent);
    background: var(--tag-bg);
    padding: 2px 10px;
    border-radius: 12px;
}
.cat-page-header p {
    color: var(--text-secondary);
    font-size: 0.95rem;
}
.cat-page-list {
    display: flex;
    flex-direction: column;
}
.cat-page-item {
    display: flex;
    align-items: baseline;
    gap: 0.75rem;
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    text-decoration: none;
    color: inherit;
    transition: background 0.2s ease;
    border-bottom: 1px solid var(--border-color);
}
.cat-page-item:last-child { border-bottom: none; }
.cat-page-item:hover { background: rgba(99,102,241,0.06); }
.cat-page-item:hover .cp-title { color: var(--accent); }
.cp-date {
    font-size: 0.82rem;
    color: var(--text-tertiary);
    font-family: var(--font-mono);
    white-space: nowrap;
    min-width: 80px;
}
.cp-title {
    font-size: 1rem;
    font-weight: 500;
    color: var(--text-heading);
    transition: color 0.2s ease;
    flex: 1;
}
.cp-tags {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
}
.cp-tag {
    font-size: 0.7rem;
    color: var(--accent);
    background: var(--tag-bg);
    padding: 2px 8px;
    border-radius: 4px;
    white-space: nowrap;
}
.back-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    color: var(--accent);
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 500;
    margin-top: 2rem;
    padding: 8px 0;
    transition: opacity 0.2s;
}
.back-link:hover { opacity: 0.8; }
@media (max-width: 768px) {
    .cat-page-item { flex-wrap: wrap; gap: 2px 8px; }
    .cp-tags { display: none; }
}
</style>

<div class="cat-page">
    <div class="cat-page-header">
        <h1>📂 {{ page.title }} <span class="count-badge">{{ page.posts.size }} 篇</span></h1>
        <p>该分类下的所有文章</p>
    </div>
    <div class="cat-page-list">
        {% for post in page.posts %}
        <a href="{{ post.url | relative_url }}" class="cat-page-item">
            <span class="cp-date">{{ post.date | date: "%Y-%m-%d" }}</span>
            <span class="cp-title">{{ post.title | escape }}</span>
            {% if post.tags.size > 0 %}
            <span class="cp-tags">
                {% for tag in post.tags limit:3 %}
                <span class="cp-tag">{{ tag }}</span>
                {% endfor %}
            </span>
            {% endif %}
        </a>
        {% endfor %}
    </div>
    <a href="{{ '/categories/' | relative_url }}" class="back-link">← 返回分类</a>
</div>
