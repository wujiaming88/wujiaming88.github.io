<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "zh-CN" }}">
{% include head.html %}
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="navbar-content">
            <a href="{{ '/' | relative_url }}" class="navbar-brand">
                {{ site.title }}
            </a>
            
            <ul class="navbar-nav">
                <li><a href="{{ '/' | relative_url }}" class="nav-link {% if page.url == '/' %}active{% endif %}">首页</a></li>
                <li><a href="{{ '/archives/' | relative_url }}" class="nav-link {% if page.url contains 'archives' %}active{% endif %}">归档</a></li>
                <li><a href="{{ '/categories/' | relative_url }}" class="nav-link {% if page.url contains 'categories' %}active{% endif %}">分类</a></li>
                <!-- 搜索已融合到首页 -->
                <li><a href="{{ '/about/' | relative_url }}" class="nav-link {% if page.url contains 'about' %}active{% endif %}">关于</a></li>
            </ul>
        </div>
    </nav>

    <!-- 主内容区 -->
    <main class="main-content">
        <div class="container">
            {{ content }}
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="footer-content">
            <p style="font-size: 0.85rem;">&copy; {{ site.time | date: '%Y' }} {{ site.title }} · 基于 Jekyll 构建</p>
        </div>
    </footer>

    <!-- Prism.js 代码高亮脚本 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
    
    <!-- 代码块增强：为 kramdown 生成的代码块添加 Prism 类名 -->
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        // kramdown 生成 <pre><code class="language-xxx"> 格式
        // 确保 pre 也有对应的 language 类
        document.querySelectorAll('pre > code[class*="language-"]').forEach(function(code) {
            var lang = code.className.match(/language-(\S+)/);
            if (lang && lang[1]) {
                code.parentElement.classList.add('language-' + lang[1]);
            }
        });
        
        // 处理没有语言标记的代码块（ASCII 图表等）
        document.querySelectorAll('pre > code:not([class*="language-"])').forEach(function(code) {
            code.classList.add('language-text');
            code.parentElement.classList.add('language-text');
        });
        
        // 重新运行 Prism 高亮
        if (window.Prism) {
            Prism.highlightAll();
        }
        
        // 为表格添加响应式包裹
        document.querySelectorAll('.post-content table').forEach(function(table) {
            if (!table.parentElement.classList.contains('table-wrapper')) {
                var wrapper = document.createElement('div');
                wrapper.className = 'table-wrapper';
                wrapper.style.overflowX = 'auto';
                table.parentNode.insertBefore(wrapper, table);
                wrapper.appendChild(table);
            }
        });
    });
    </script>

    <!-- JavaScript -->
    <script>
        // 图片懒加载
        document.addEventListener('DOMContentLoaded', () => {
            const lazyImages = document.querySelectorAll('img.lazyload');
            
            if ('IntersectionObserver' in window) {
                const imageObserver = new IntersectionObserver((entries, observer) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            const image = entry.target;
                            image.src = image.dataset.src;
                            image.classList.remove('lazyload');
                            image.classList.add('lazyloaded');
                            imageObserver.unobserve(image);
                        }
                    });
                });
                
                lazyImages.forEach(image => {
                    imageObserver.observe(image);
                });
            }
        });
        
        // 平滑滚动
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
            });
        });
        
        // 返回顶部按钮
        const backToTop = document.createElement('button');
        backToTop.textContent = '↑';
        backToTop.style.cssText = `
            position: fixed;
            bottom: 1rem;
            right: 1.5rem;
            background-color: rgba(66, 165, 245, 0.9);
            color: white;
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            font-size: 1.2rem;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        `;
        
        document.body.appendChild(backToTop);
        
        window.addEventListener('scroll', () => {
            if (window.pageYOffset > 300) {
                backToTop.style.opacity = '1';
                backToTop.style.visibility = 'visible';
            } else {
                backToTop.style.opacity = '0';
                backToTop.style.visibility = 'hidden';
            }
        });
        
        backToTop.addEventListener('click', () => {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        });
    </script>
</body>
</html>
