<div class="category-links">
  <h3>Categories</h3>
  <ul class="category-list">
    {% assign sorted_categories = site.categories | sort %}
    {% for category in sorted_categories %}
    <li>
      <a href="{{ site.baseurl }}/categories/#{{ category[0] | slugify }}">
        {{ category[0] }} ({{ category[1].size }})
      </a>
    </li>
    {% endfor %}
  </ul>
</div>
