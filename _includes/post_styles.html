<style>
/* 统一文章页面样式 - 优化阅读体验 */

/* Prism.js Tomorrow Night 主题 - 匹配 #1e293b 背景 */
code[class*="language-"],
pre[class*="language-"] {
    color: #c5c8c6;
    text-shadow: none;
    font-family: 'Fira Code', 'JetBrains Mono', 'Source Code Pro', Consolas, Monaco, 'Andale Mono', monospace;
    font-size: 0.9rem;
    direction: ltr;
    text-align: left;
    white-space: pre;
    word-spacing: normal;
    word-break: normal;
    line-height: 1.6;
    tab-size: 4;
    hyphens: none;
}

/* 代码块容器 - 带复制按钮 */
pre[class*="language-"] {
    padding: 1.5rem;
    padding-top: 2.5rem;
    margin: 1.5rem 0;
    overflow: auto;
    border-radius: 12px;
    background: #1e293b;
    position: relative;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}

/* 复制按钮 */
.code-copy-btn {
    position: absolute;
    top: 8px;
    right: 12px;
    padding: 6px 12px;
    font-size: 12px;
    color: #94a3b8;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s ease;
    z-index: 10;
}

.code-copy-btn:hover {
    color: #fff;
    background: rgba(255,255,255,0.2);
}

.code-copy-btn.copied {
    color: #22c55e;
    border-color: #22c55e;
}

/* 行内代码 */
:not(pre) > code[class*="language-"],
pre[class*="language-"] {
    background: #1e293b;
}

:not(pre) > code[class*="language-"] {
    padding: 0.2rem 0.4rem;
    border-radius: 4px;
    color: #e879f9;
}

/* Prism.js 语法高亮 - 基于 Tomorrow Night */
.token.comment,
.token.prolog,
.token.doctype,
.token.cdata {
    color: #5c6370;
}

.token.punctuation {
    color: #abb2bf;
}

.token.property,
.token.tag,
.token.boolean,
.token.number,
.token.constant,
.token.symbol,
.token.deleted {
    color: #e06c75;
}

.token.selector,
.token.attr-name,
.token.string,
.token.char,
.token.builtin,
.token.inserted {
    color: #98c379;
}

.token.operator,
.token.entity,
.token.url,
.language-css .token.string,
.style .token.string {
    color: #56b6c2;
}

.token.atrule,
.token.attr-value,
.token.keyword {
    color: #c678dd;
}

.token.function,
.token.class-name {
    color: #61afef;
}

.token.regex,
.token.important,
.token.variable {
    color: #d19a66;
}

/* 调整主内容区宽度 */
.page-content {
    max-width: 800px;
    margin: 0 auto;
    padding: 2rem 0;
}

.wrapper {
    max-width: 800px;
    margin: 0 auto;
    padding: 0 2rem;
}

/* 文章内容优化 */
.post-content {
    line-height: 1.8;
    font-size: 1.125rem;
    color: #374151;
}

.post-content h1 {
    font-size: 2.25rem;
    margin: 2rem 0 1.5rem 0;
    font-weight: bold;
    color: #1f2937;
    border-bottom: 3px solid #6366f1;
    padding-bottom: 0.5rem;
    line-height: 1.3;
}

.post-content h2 {
    font-size: 1.75rem;
    margin: 2rem 0 1.25rem 0;
    font-weight: bold;
    color: #1f2937;
    border-bottom: 2px solid #6366f1;
    padding-bottom: 0.3rem;
}

.post-content h3 {
    font-size: 1.375rem;
    margin: 1.5rem 0 1rem 0;
    font-weight: bold;
    color: #1f2937;
}

.post-content p {
    margin-bottom: 1.5rem;
    text-align: justify;
    line-height: 1.8;
}

.post-content ul, .post-content ol {
    margin-bottom: 1.5rem;
    padding-left: 2rem;
}

.post-content li {
    margin-bottom: 0.5rem;
    line-height: 1.8;
}

/* 行内代码（兼容非 Prism 渲染） */
.post-content code:not([class*="language-"]) {
    background: #f1f5f9;
    padding: 0.2rem 0.5rem;
    border-radius: 4px;
    font-family: 'Fira Code', 'JetBrains Mono', Consolas, monospace;
    font-size: 0.9em;
    color: #e879f9;
}

/* 引用块 */
.post-content blockquote {
    border-left: 4px solid #6366f1;
    padding-left: 1.5rem;
    margin: 1.5rem 0;
    color: #6b7280;
    font-style: italic;
    background: #f9fafb;
    padding: 1rem 1.5rem;
    border-radius: 0 8px 8px 0;
}

/* 图片 */
.post-content img {
    max-width: 100%;
    height: auto;
    border-radius: 12px;
    margin: 1.5rem 0;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
}

/* 链接 */
.post-content a {
    color: #6366f1;
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.2s ease;
}

.post-content a:hover {
    border-bottom-color: #6366f1;
}

/* 表格 */
.post-content table {
    width: 100%;
    border-collapse: collapse;
    margin: 1.5rem 0;
}

.post-content th,
.post-content td {
    padding: 0.75rem 1rem;
    border: 1px solid #e5e7eb;
    text-align: left;
}

.post-content th {
    background: #f9fafb;
    font-weight: 600;
}

.post-content tr:nth-child(even) {
    background: #f9fafb;
}

/* 文章头部 */
.post-header {
    margin-bottom: 2rem;
}

.post-title {
    font-size: 2.5rem;
    margin-bottom: 1rem;
    font-weight: bold;
    color: #1f2937;
    line-height: 1.3;
}

.post-meta {
    color: #6b7280;
    font-size: 1rem;
    margin-bottom: 0;
    display: flex;
    align-items: center;
    gap: 1rem;
}

.post-meta .separator {
    color: #d1d5db;
}

/* 文章底部 */
.post-footer {
    margin-top: 3rem;
    padding-top: 2rem;
    border-top: 1px solid #e5e7eb;
}

.post-footer .post-meta {
    justify-content: center;
    font-size: 0.9rem;
}

/* 响应式设计 */
@media (max-width: 768px) {
    .page-content {
        padding: 1rem 0;
    }
    
    .wrapper {
        padding: 0 1rem;
    }
    
    .post-title {
        font-size: 1.875rem;
    }
    
    .post-content h1 {
        font-size: 1.75rem;
    }
    
    .post-content h2 {
        font-size: 1.5rem;
    }
    
    .post-content h3 {
        font-size: 1.25rem;
    }
    
    .post-content {
        font-size: 1rem;
    }
    
    pre[class*="language-"] {
        padding: 1rem;
        padding-top: 2rem;
        font-size: 0.85rem;
    }
}
</style>

<!-- Prism.js 复制按钮功能 -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    // 为所有代码块添加复制按钮
    document.querySelectorAll('pre[class*="language-"]').forEach(function(pre) {
        // 创建复制按钮
        var btn = document.createElement('button');
        btn.className = 'code-copy-btn';
        btn.textContent = '复制';
        
        // 添加点击事件
        btn.addEventListener('click', function() {
            var code = pre.querySelector('code');
            if (code) {
                var text = code.textContent || code.innerText;
                
                navigator.clipboard.writeText(text).then(function() {
                    btn.textContent = '已复制!';
                    btn.classList.add('copied');
                    
                    setTimeout(function() {
                        btn.textContent = '复制';
                        btn.classList.remove('copied');
                    }, 2000);
                }).catch(function(err) {
                    btn.textContent = '复制失败';
                    setTimeout(function() {
                        btn.textContent = '复制';
                    }, 2000);
                });
            }
        });
        
        pre.appendChild(btn);
    });
});
</script>
