---
layout: page
title: Tags
permalink: /tags/
---

<div class="page-content">
  <h1>Tags</h1>
  <ul class="tag-list">
    {% assign sorted_tags = site.tags | sort %}
    {% for tag in sorted_tags %}
    <li>
      <a href="{{ site.baseurl }}/tags/{{ tag[0] | slugify }}">
        {{ tag[0] }} ({{ tag[1].size }})
      </a>
    </li>
    {% endfor %}
  </ul>
</div>
