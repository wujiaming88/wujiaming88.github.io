<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分类与标签</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .page-title {
            font-size: 2rem;
            color: #1f2937;
            text-align: center;
            margin-bottom: 2rem;
        }

        /* Tab 切换器 */
        .tab-nav {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }

        .tab-btn {
            padding: 0.75rem 2rem;
            border: 2px solid #e5e7eb;
            background: white;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 500;
            color: #6b7280;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn:hover {
            border-color: #6366f1;
            color: #6366f1;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white;
            border-color: #6366f1;
        }

        /* 卡片列表 */
        .card-grid {
            display: grid;
            gap: 1rem;
        }

        .taxonomy-card {
            background: white;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .taxonomy-card:hover {
            border-color: #c7d2fe;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
            transform: translateY(-2px);
        }

        .card-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1f2937;
        }

        .card-count {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            color: white;
            padding: 0.35rem 0.85rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .view-section {
            display: none;
        }

        .view-section.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="page-title">分类与标签</h1>
        
        <!-- Tab 按钮 -->
        <div class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('categories')">分类</button>
            <button class="tab-btn" onclick="switchTab('tags')">标签</button>
        </div>
        
        <!-- 分类列表 -->
        <div id="categories" class="view-section active">
            <div class="card-grid">
                <div class="taxonomy-card">
                    <span class="card-name">技术教程</span>
                    <span class="card-count">12</span>
                </div>
                <div class="taxonomy-card">
                    <span class="card-name">产品设计</span>
                    <span class="card-count">8</span>
                </div>
                <div class="taxonomy-card">
                    <span class="card-name">AI 工具</span>
                    <span class="card-count">15</span>
                </div>
                <div class="taxonomy-card">
                    <span class="card-name">开发日志</span>
                    <span class="card-count">6</span>
                </div>
                <div class="taxonomy-card">
                    <span class="card-name">经验分享</span>
                    <span class="card-count">9</span>
                </div>
            </div>
        </div>
        
        <!-- 标签列表 -->
        <div id="tags" class="view-section">
            <div class="card-grid">
                <div class="taxonomy-card">
                    <span class="card-name">JavaScript</span>
                    <span class="card-count">18</span>
                </div>
                <div class="taxonomy-card">
                    <span class="card-name">Python</span>
                    <span class="card-count">14</span>
                </div>
                <div class="taxonomy-card">
                    <span class="card-name">AI</span>
                    <span class="card-count">22</span>
                </div>
                <div class="taxonomy-card">
                    <span class="card-name">ChatGPT</span>
                    <span class="card-count">10</span>
                </div>
                <div class="taxonomy-card">
                    <span class="card-name">前端</span>
                    <span class="card-count">16</span>
                </div>
                <div class="taxonomy-card">
                    <span class="card-name">后端</span>
                    <span class="card-count">11</span>
                </div>
                <div class="taxonomy-card">
                    <span class="card-name">DevOps</span>
                    <span class="card-count">7</span>
                </div>
                <div class="taxonomy-card">
                    <span class="card-name">效率工具</span>
                    <span class="card-count">13</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function switchTab(tabName) {
            // 隐藏所有视图
            document.querySelectorAll('.view-section').forEach(section => {
                section.classList.remove('active');
            });
            
            // 移除所有按钮的 active 状态
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // 显示选中的视图
            document.getElementById(tabName).classList.add('active');
            
            // 给当前按钮添加 active 状态
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
