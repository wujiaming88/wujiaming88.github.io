<div class="search-page">
  <div class="search-page-header">
    <h1 class="search-page-title">
      <span class="title-icon">🔍</span> 全文搜索
    </h1>
    <p class="search-page-desc">搜索所有文章的标题、正文、标签和分类</p>
  </div>

  <div class="search-input-wrapper">
    <div class="search-input-box">
      <span class="search-icon-lg">🔍</span>
      <input type="text" id="lunrSearchInput" class="search-input-lg" placeholder="输入关键词搜索全部文章内容..." autocomplete="off" autofocus>
      <button class="search-clear-btn" id="searchClearBtn" style="display:none;">✕</button>
    </div>
    <div class="search-tips">
      <span>提示：支持中文搜索，输入任意关键词即可搜索文章全文</span>
    </div>
  </div>

  <div id="searchStatus" class="search-status" style="display:none;"></div>

  <div id="searchResultsList" class="search-results-list"></div>
</div>

<style>

  text-align: center;

  font-size: 2rem;
  font-weight: 700;

  color: var(--text-secondary, #6b7280);
  font-size: 1rem;

  border: none;
  background: transparent;
  font-size: 1.1rem;
  color: var(--text-primary, #1f2937);

  display: flex;

  justify-content: center;

  height: 28px;
  border: none;
  background: var(--bg-tertiary, #f3f4f6);
  color: var(--text-secondary, #6b7280);
  border-radius: 50%;
  cursor: pointer;
  font-size: 0.8rem;
  transition: all 0.2s ease;
}

  background: var(--accent-primary, #6366f1);

  }

    padding: 0.75rem 1rem;
  }

  .search-input-lg {
    font-size: 16px;

<!-- Lunr.js via CDN -->
<script src="https://unpkg.com/lunr@2.3.9/lunr.min.js"></script>

<script>
(function() {
  'use strict';

  var input = document.getElementById('lunrSearchInput');
  var clearBtn = document.getElementById('searchClearBtn');
  var statusEl = document.getElementById('searchStatus');
  var resultsEl = document.getElementById('searchResultsList');

  var searchData = [];
  var lunrIndex = null;
  var isReady = false;

  // --- 中文分词：简单的 unigram/bigram 分词器 ---
  function tokenizeChinese(text) {
    if (!text) return [];
    var tokens = [];
    // 先用 lunr 默认分词处理英文
    var words = text.split(/[\s\-_,.;:!?()[\]{}"'`~@#$%^&*+=<>/\\|]+/);
    words.forEach(function(w) {
      w = w.trim().toLowerCase();
      if (w.length > 0) tokens.push(w);
    });
    // 对中文字符做 bigram 分词
    var cjk = text.replace(/[^\u4e00-\u9fff\u3400-\u4dbf]/g, '');
    for (var i = 0; i < cjk.length; i++) {
      tokens.push(cjk[i]); // unigram
      if (i + 1 < cjk.length) {
        tokens.push(cjk[i] + cjk[i + 1]); // bigram
      }
    }
    return tokens;
  }

  // 自定义 lunr tokenizer
  function chineseTokenizer(obj) {
    var str = obj.toString ? obj.toString() : '';
    return tokenizeChinese(str).map(function(t) {
      return new lunr.Token(t);
    });
  }
  chineseTokenizer.label = 'chineseTokenizer';

  // --- 加载搜索数据并构建索引 ---
  function loadSearchIndex() {
    statusEl.style.display = 'block';
    statusEl.textContent = '正在加载搜索索引...';

    fetch('{{ "/search.json" | relative_url }}')
      .then(function(res) { return res.json(); })
      .then(function(data) {
        searchData = data;
        buildIndex();
        isReady = true;
        statusEl.style.display = 'none';

        // 如果已有输入，立即搜索
        if (input.value.trim()) {
          doSearch(input.value.trim());
        }

        // 检查 URL 参数
        var params = new URLSearchParams(window.location.search);
        var q = params.get('q');
        if (q) {
          input.value = q;
          doSearch(q);
        }
      })
      .catch(function(err) {
        statusEl.textContent = '搜索索引加载失败，请刷新页面重试';
        console.error('Failed to load search index:', err);
      });
  }

  function buildIndex() {
    lunrIndex = lunr(function() {
      var builder = this;
      builder.tokenizer = chineseTokenizer;
      // Disable stemmer and stopWordFilter for Chinese
      builder.pipeline.reset();
      builder.pipeline.add(lunr.trimmer);

      builder.ref('url');
      builder.field('title', { boost: 10 });
      builder.field('tags', { boost: 5 });
      builder.field('categories', { boost: 3 });
      builder.field('excerpt', { boost: 2 });
      builder.field('content');

      searchData.forEach(function(doc) {
        builder.add({
          url: doc.url,
          title: doc.title,
          tags: (doc.tags || []).join(' '),
          categories: (doc.categories || []).join(' '),
          excerpt: doc.excerpt || '',
          content: doc.content || ''
        });
      });
    });
  }

  // --- 搜索 ---
  function doSearch(query) {
    if (!isReady || !query) {
      resultsEl.innerHTML = '';
      statusEl.style.display = 'none';
      clearBtn.style.display = 'none';
      return;
    }

    clearBtn.style.display = 'flex';

    // 对查询进行分词
    var queryTokens = tokenizeChinese(query);
    var searchQuery = queryTokens.map(function(t) {
      return '*' + t + '*';
    }).join(' ');

    var results;
    try {
      results = lunrIndex.search(searchQuery);
    } catch(e) {
      // fallback: 直接搜索
      try {
        results = lunrIndex.search(query);
      } catch(e2) {
        results = [];
      }
    }

    // 将结果映射到原始数据
    var matched = results.map(function(r) {
      return searchData.find(function(d) { return d.url === r.ref; });
    }).filter(Boolean);

    statusEl.style.display = 'block';
    statusEl.textContent = '找到 ' + matched.length + ' 篇与"' + query + '"相关的文章';

    if (matched.length === 0) {
      resultsEl.innerHTML =
        '<div class="search-no-results">' +
          '<div class="no-results-icon">🔍</div>' +
          '<div class="no-results-text">未找到与"' + escHtml(query) + '"相关的文章</div>' +
          '<div class="no-results-hint">试试其他关键词，或使用更短的搜索词</div>' +
        '</div>';
      return;
    }

    resultsEl.innerHTML = matched.map(function(doc) {
      var snippet = getSnippet(doc.content, query, 150);
      var highlightedTitle = highlightText(doc.title, query);
      var highlightedSnippet = highlightText(snippet, query);
      var category = (doc.categories && doc.categories[0]) || '技术';
      var tagsHtml = (doc.tags || []).slice(0, 4).map(function(t) {
        return '<span class="result-tag">#' + escHtml(t) + '</span>';
      }).join('');

      return '<a href="' + doc.url + '" class="search-result-card">' +
        '<div class="result-title">' + highlightedTitle + '</div>' +
        '<div class="result-meta">' +
          '<span>' + doc.date_display + '</span>' +
          '<span>·</span>' +
          '<span class="result-category">' + escHtml(category) + '</span>' +
        '</div>' +
        '<p class="result-snippet">' + highlightedSnippet + '</p>' +
        (tagsHtml ? '<div class="result-tags">' + tagsHtml + '</div>' : '') +
      '</a>';
    }).join('');

    // 更新 URL 参数（不刷新页面）
    var url = new URL(window.location);
    url.searchParams.set('q', query);
    history.replaceState(null, '', url);
  }

  // --- 获取匹配内容片段 ---
  function getSnippet(content, query, maxLen) {
    if (!content) return '';
    var lower = content.toLowerCase();
    var qLower = query.toLowerCase();

    // 尝试找到查询词在内容中的位置
    var idx = lower.indexOf(qLower);

    // 如果找不到完整查询，尝试找单个字
    if (idx === -1) {
      for (var i = 0; i < qLower.length; i++) {
        idx = lower.indexOf(qLower[i]);
        if (idx !== -1) break;
      }
    }

    if (idx === -1) {
      return content.substring(0, maxLen) + (content.length > maxLen ? '...' : '');
    }

    var start = Math.max(0, idx - 60);
    var end = Math.min(content.length, idx + maxLen);
    var snippet = content.substring(start, end);

    if (start > 0) snippet = '...' + snippet;
    if (end < content.length) snippet = snippet + '...';

    return snippet;
  }

  // --- 高亮关键词 ---
  function highlightText(text, query) {
    if (!text || !query) return escHtml(text || '');
    var escaped = escHtml(text);
    var chars = query.split('');

    // 高亮完整查询
    var safeQ = escRegex(escHtml(query));
    var re = new RegExp('(' + safeQ + ')', 'gi');
    escaped = escaped.replace(re, '<mark>$1</mark>');

    // 如果完整查询没有匹配，高亮单个字符（对中文有效）
    if (escaped.indexOf('<mark>') === -1) {
      chars.forEach(function(c) {
        if (c.trim()) {
          var safeC = escRegex(escHtml(c));
          var charRe = new RegExp('(' + safeC + ')', 'gi');
          escaped = escaped.replace(charRe, '<mark>$1</mark>');
        }
      });
    }

    return escaped;
  }

  function escHtml(s) {
    var d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
  }

  function escRegex(s) {
    return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  }

  // --- 事件绑定 ---
  var debounceTimer;
  input.addEventListener('input', function() {
    clearTimeout(debounceTimer);
    var q = input.value.trim();
    debounceTimer = setTimeout(function() {
      if (q) {
        doSearch(q);
      } else {
        resultsEl.innerHTML = '';
        statusEl.style.display = 'none';
        clearBtn.style.display = 'none';
        var url = new URL(window.location);
        url.searchParams.delete('q');
        history.replaceState(null, '', url);
      }
    }, 300);
  });

  clearBtn.addEventListener('click', function() {
    input.value = '';
    resultsEl.innerHTML = '';
    statusEl.style.display = 'none';
    clearBtn.style.display = 'none';
    input.focus();
    var url = new URL(window.location);
    url.searchParams.delete('q');
    history.replaceState(null, '', url);
  });

  // ⌘K / Ctrl+K 聚焦
  document.addEventListener('keydown', function(e) {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
      e.preventDefault();
      input.focus();
      input.select();
    }
  });

  // 初始化
  loadSearchIndex();
})();
</script>
